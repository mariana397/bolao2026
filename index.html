<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 Bolão Copa 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1c2537;--surface3:#232f45;
  --border:#2a3a55;--text:#e8edf5;--text2:#8899bb;--text3:#556688;
  --gold:#f5c842;--silver:#aab4c8;--bronze:#c87d3e;
  --green:#22c55e;--green-bg:rgba(34,197,94,0.12);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,0.12);
  --radius:10px;--radius-sm:6px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:15px;min-height:100vh}
.header{background:linear-gradient(135deg,#0f1e3a,#1a2d50 50%,#0f1e3a);border-bottom:1px solid var(--border);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.header h1{font-size:21px;font-weight:700;letter-spacing:-.3px}
.header h1 span{color:var(--gold)}
.header-sub{font-size:12px;color:var(--text2);margin-top:2px}
.sync-btn{display:flex;align-items:center;gap:7px;padding:7px 15px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);cursor:pointer;font-size:13px;font-weight:500;transition:all .2s}
.sync-btn:hover{background:var(--surface3);border-color:var(--blue)}
.sync-btn:disabled{opacity:.5;cursor:default}
.sync-status{font-size:11px;color:var(--text3);margin-top:3px;text-align:right}
.tabs{display:flex;gap:2px;padding:14px 24px 0;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto}
.tab{padding:9px 15px;border:none;border-bottom:2px solid transparent;background:none;color:var(--text2);cursor:pointer;font-size:13px;font-weight:500;margin-bottom:-1px;transition:all .15s;border-radius:var(--radius-sm) var(--radius-sm) 0 0;white-space:nowrap}
.tab:hover{color:var(--text);background:var(--surface2)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.content{padding:22px;max-width:960px;margin:0 auto}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:24px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.metric .val{font-size:24px;font-weight:700;color:var(--gold)}
.metric .lbl{font-size:11px;color:var(--text2);margin-top:3px}
.section-title{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.rank-table{width:100%;border-collapse:collapse;margin-bottom:24px}
.rank-table th{padding:9px 13px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.rank-table td{padding:11px 13px;border-bottom:1px solid var(--border)}
.rank-table tr:last-child td{border-bottom:none}
.rank-table tr:hover td{background:var(--surface2)}
.pos-badge{display:inline-flex;align-items:center;justify-content:center;width:25px;height:25px;border-radius:50%;font-size:12px;font-weight:700}
.pos-1 .pos-badge{background:rgba(245,200,66,.15);color:var(--gold);border:1px solid rgba(245,200,66,.3)}
.pos-2 .pos-badge{background:rgba(170,180,200,.1);color:var(--silver);border:1px solid rgba(170,180,200,.3)}
.pos-3 .pos-badge{background:rgba(200,125,62,.1);color:var(--bronze);border:1px solid rgba(200,125,62,.3)}
.name-cell{font-weight:600}
.pts-cell{font-size:17px;font-weight:700;color:var(--gold);text-align:right}
.num-cell{text-align:center;color:var(--text2)}
.bar-wrap{display:flex;align-items:center;justify-content:flex-end;gap:8px}
.mini-bar{width:70px;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden}
.mini-fill{height:100%;border-radius:2px;background:var(--gold)}
.progress-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:16px}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:13px;color:var(--text2)}
.progress-bar{height:7px;background:var(--surface3);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#2563eb,#60a5fa);transition:width .5s}
.phase-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.phase-pill{padding:5px 12px;border:1px solid var(--border);border-radius:20px;background:var(--surface);color:var(--text2);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s}
.phase-pill:hover{border-color:var(--blue);color:var(--text)}
.phase-pill.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700}
.part-select{padding:7px 13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;margin-bottom:18px;width:100%;max-width:320px}
.group-hdr{background:var(--surface2);padding:7px 13px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;border-top:1px solid var(--border)}
.game-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.game-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:9px 13px;border-bottom:1px solid var(--border)}
.game-row:last-child{border-bottom:none}
.game-row:hover{background:var(--surface2)}
.game-name{font-size:13px;color:var(--text)}
.game-auto{font-size:11px;color:var(--text3);margin-top:2px}
.score-inputs{display:flex;align-items:center;gap:5px}
.score-inputs input{width:34px;text-align:center;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px;color:var(--text);font-size:14px;font-weight:600}
.score-inputs input:focus{outline:none;border-color:var(--blue)}
.sep{color:var(--text3);font-size:12px}
.save-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 20px;background:var(--blue);border:none;border-radius:var(--radius-sm);color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:12px;transition:all .2s}
.save-btn:hover{background:#3b82f6}
.penalty-note{font-size:11px;color:var(--text3);font-style:italic;padding:8px 13px;background:var(--surface2);border-radius:0 0 var(--radius) var(--radius);border-top:1px solid var(--border)}
.palpite-table{width:100%;border-collapse:collapse;margin-bottom:20px}
.palpite-table th{padding:9px 11px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.palpite-table td{padding:9px 11px;border-bottom:1px solid var(--border);font-size:13px}
.palpite-table tr:hover td{background:var(--surface2)}
.fase-hdr{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.8px;padding:10px 0 6px;border-top:1px solid var(--border);margin-top:14px}
.fase-hdr:first-child{border-top:none;margin-top:0}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge.exact{background:var(--green-bg);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.badge.result{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(96,165,250,.25)}
.badge.miss{background:rgba(248,113,113,.08);color:#f87171;border:1px solid rgba(248,113,113,.2)}
.badge.pending{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 16px;font-size:13px;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,.5);opacity:0;transform:translateY(6px);transition:all .3s;z-index:999;pointer-events:none;max-width:280px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{border-color:rgba(34,197,94,.4);color:var(--green)}
.toast.error{border-color:rgba(248,113,113,.4);color:#f87171}
.section{display:none}.section.active{display:block}
</style>
</head>

// ─── SYNC ────────────────────────────────────────────────────────────────────
async function syncResultados(manual=false){
  const btn=document.getElementById('sync-btn');
  const status=document.getElementById('sync-status');
  btn.disabled=true;
  if(manual)btn.textContent='⟳ Buscando...';
  try{
    const r=await fetch('data/results.json?t='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    const ov=loadLocalOverrides();
    STATE.resultados=data.resultados||{fase1:{},dezesseis:{},oitavas:{},quartas:{},semi:{},terceiro:{},final:{}};
    // garante todas as chaves existem
    ['fase1','dezesseis','oitavas','quartas','semi','terceiro','final'].forEach(f=>{
      if(!STATE.resultados[f])STATE.resultados[f]={};
    });
    Object.entries(ov).forEach(([fase,jogos])=>{
      if(!STATE.resultados[fase])STATE.resultados[fase]={};
      Object.entries(jogos).forEach(([idx,res])=>{STATE.resultados[fase][idx]=res;});
    });
    STATE.updatedAt=data.updated_at;
    const d=new Date(data.updated_at);
    status.textContent=`Sync: ${d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})} ${d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`;
    atualizarClassificados();
    renderRanking();
    if(document.getElementById('palpites').classList.contains('active'))renderPalpites();
    if(document.getElementById('resultados').classList.contains('active'))renderResultados();
    if(manual)toast('Resultados atualizados!','success');
  }catch(e){
    // sem JSON remoto — usa só overrides locais
    const ov=loadLocalOverrides();
    ['fase1','dezesseis','oitavas','quartas','semi','terceiro','final'].forEach(f=>{
      if(!STATE.resultados[f])STATE.resultados[f]={};
      if(ov[f])Object.entries(ov[f]).forEach(([idx,res])=>{STATE.resultados[f][idx]=res;});
    });
    status.textContent='Dados locais';
    if(manual)toast('Sem conexão — usando dados locais','error');
    atualizarClassificados();
    renderRanking();
  }finally{
    btn.disabled=false;btn.textContent='⟳ Atualizar';
  }
}

// ─── CLASSIFICADOS AUTOMÁTICOS ───────────────────────────────────────────────
function atualizarClassificados(){
  const grupos=['A','B','C','D','E','F','G','H','I','J','K','L'];
  const idxBase={A:0,B:6,C:12,D:18,E:24,F:30,G:36,H:42,I:48,J:54,K:60,L:66};
  const timesGrupo={
    A:['México','Coreia do Sul','Rep. Tcheca','África do Sul'],
    B:['Canadá','Catar','Suíça','Bósnia'],
    C:['Brasil','Haiti','Escócia','Marrocos'],
    D:['EUA','Austrália','Turquia','Paraguai'],
    E:['Alemanha','Costa do Marfim','Equador','Curaçao'],
    F:['Holanda','Suécia','Tunísia','Japão'],
    G:['Bélgica','Irã','Nova Zelândia','Egito'],
    H:['Espanha','Arábia Saudita','Uruguai','Cabo Verde'],
    I:['França','Iraque','Noruega','Senegal'],
    J:['Argentina','Áustria','Jordânia','Argélia'],
    K:['Portugal','Uzbequistão','Colômbia','RD Congo'],
    L:['Inglaterra','Gana','Panamá','Croácia'],
  };
  // jogos dentro de cada grupo (índices locais 0-5)
  // partida: [time1idx, time2idx]
  const jogosGrupoLocal=[
    [0,3],[1,2],[2,3],[0,1],[3,1],[0,2]
  ];
  STATE.classificados={};
  grupos.forEach(g=>{
    const base=idxBase[g];
    const times=timesGrupo[g];
    const pts={};const gd={};const gf={};
    times.forEach(t=>{pts[t]=0;gd[t]=0;gf[t]=0;});
    jogosGrupoLocal.forEach(([i1,i2],li)=>{
      const res=STATE.resultados.fase1[base+li];
      if(!res||res[0]===null)return;
      const t1=times[i1],t2=times[i2];
      const [g1,g2]=res;
      gf[t1]+=g1;gf[t2]+=g2;
      gd[t1]+=(g1-g2);gd[t2]+=(g2-g1);
      if(g1>g2){pts[t1]+=3;}else if(g1<g2){pts[t2]+=3;}else{pts[t1]+=1;pts[t2]+=1;}
    });
    const sorted=times.slice().sort((a,b)=>pts[b]-pts[a]||gd[b]-gd[a]||gf[b]-gf[a]);
    STATE.classificados[g]={1:sorted[0],2:sorted[1],3:sorted[2],4:sorted[3]};
  });
}

// Resolve o nome de um time a partir da fonte (ex: '1ºA', 'V(j0)', 'P(s0)')
function resolveTime(src){
  const mGrupo=src.match(/^(\d+)º([A-L])$/);
  if(mGrupo){
    const pos=parseInt(mGrupo[1]),g=mGrupo[2];
    return STATE.classificados[g]?.[pos]||src;
  }
  // Vencedor/Perdedor de jogo anterior
  const mV=src.match(/^V\(([joqus])(\d+)\)$/);
  if(mV){
    const tipo=mV[1],idx=parseInt(mV[2]);
    let faseId;
    if(tipo==='j')faseId='dezesseis';
    else if(tipo==='o')faseId='oitavas';
    else if(tipo==='q')faseId='quartas';
    else if(tipo==='s')faseId='semi';
    const res=STATE.resultados[faseId]?.[idx];
    if(!res||res[0]===null)return src;
    const jogos=tipo==='j'?TIMES_DEZESSEIS:tipo==='o'?getJogosOitavas():tipo==='q'?getJogosQuartas():getJogosSemi();
    const jogo=jogos[idx];
    if(!jogo)return src;
    return res[0]>res[1]?jogo.t1:res[0]<res[1]?jogo.t2:(jogo.t1+'/'+jogo.t2);
  }
  const mP=src.match(/^P\(([s])(\d+)\)$/);
  if(mP){
    const idx=parseInt(mP[2]);
    const res=STATE.resultados.semi?.[idx];
    if(!res||res[0]===null)return src;
    const jogos=getJogosSemi();
    const jogo=jogos[idx];
    if(!jogo)return src;
    return res[0]<res[1]?jogo.t1:res[0]>res[1]?jogo.t2:src;
  }
  return src;
}

function getJogosOitavas(){
  return CHAVAMENTO_OITAVAS.map(c=>({t1:resolveTime(c.src1),t2:resolveTime(c.src2),data:c.data}));
}
function getJogosQuartas(){
  return CHAVAMENTO_QUARTAS.map(c=>({t1:resolveTime(c.src1),t2:resolveTime(c.src2),data:c.data}));
}
function getJogosSemi(){
  return CHAVAMENTO_SEMI.map(c=>({t1:resolveTime(c.src1),t2:resolveTime(c.src2),data:c.data}));
}
function getJogosTerceiro(){
  return CHAVAMENTO_TERCEIRO.map(c=>({t1:resolveTime(c.src1),t2:resolveTime(c.src2),data:c.data}));
}
function getJogosFinal(){
  return CHAVAMENTO_FINAL.map(c=>({t1:resolveTime(c.src1),t2:resolveTime(c.src2),data:c.data}));
}

function getJogosFase(faseId){
  if(faseId==='fase1')return JOGOS_GRUPOS;
  if(faseId==='dezesseis')return TIMES_DEZESSEIS.map((t,i)=>({...t,data:JOGOS_DEZESSEIS_BASE[i].data,src1:JOGOS_DEZESSEIS_BASE[i].src1,src2:JOGOS_DEZESSEIS_BASE[i].src2}));
  if(faseId==='oitavas')return getJogosOitavas();
  if(faseId==='quartas')return getJogosQuartas();
  if(faseId==='semi')return getJogosSemi();
  if(faseId==='terceiro')return getJogosTerceiro();
  if(faseId==='final')return getJogosFinal();
  return [];
}

function getPalpites(p,faseId,idx){
  if(faseId==='fase1')return (PALPITES_GRUPOS[p]||[])[idx];
  if(faseId==='dezesseis')return (PALPITES_DEZESSEIS[p]||[])[idx];
  return ((PALPITES_MATA[faseId]||{})[p]||[])[idx];
}

// ─── PONTUAÇÃO ───────────────────────────────────────────────────────────────
function resJogo(g1,g2){return g1>g2?'h':g1<g2?'a':'d';}

function calcPontos(p){
  let total=0,acertosR=0,acertosE=0;
  FASES.forEach(({id,peso})=>{
    const jogos=getJogosFase(id);
    jogos.forEach((_,idx)=>{
      const res=STATE.resultados[id]?.[idx];
      if(!res||res[0]===null||res[1]===null)return;
      const palp=getPalpites(p,id,idx);
      if(!palp||palp[0]===null||palp[1]===null)return;
      if(resJogo(res[0],res[1])===resJogo(palp[0],palp[1])){
        acertosR++;total+=peso;
        if(res[0]===palp[0]&&res[1]===palp[1]){acertosE++;total+=2*peso;}
      }
    });
  });
  return{total,acertosR,acertosE};
}

// ─── RENDER RANKING ──────────────────────────────────────────────────────────
function renderRanking(){
  const scores=PARTICIPANTES.map(p=>({p,...calcPontos(p)})).sort((a,b)=>b.total-a.total);
  const maxPts=scores[0]?.total||1;
  document.getElementById('rank-body').innerHTML=scores.map((s,i)=>`
    <tr class="pos-${Math.min(i+1,3)}">
      <td><span class="pos-badge">${i+1}</span></td>
      <td class="name-cell">${s.p}</td>
      <td class="num-cell">${s.acertosR}</td>
      <td class="num-cell">${s.acertosE}</td>
      <td class="pts-cell"><div class="bar-wrap"><div class="mini-bar"><div class="mini-fill" style="width:${Math.round(s.total/maxPts*100)}%"></div></div>${s.total}</div></td>
    </tr>`).join('');

  let totalJ=0,jogadosJ=0;
  const countsFase={};
  FASES.forEach(({id})=>{
    const jogos=getJogosFase(id);
    totalJ+=jogos.length;
    let n=0;
    jogos.forEach((_,i)=>{const r=STATE.resultados[id]?.[i];if(r&&r[0]!==null)n++;});
    jogadosJ+=n;
    countsFase[id]=n;
  });
  const pct=totalJ?Math.round(jogadosJ/totalJ*100):0;
  document.getElementById('prog-label').textContent=`Torneio — ${pct}% concluído`;
  document.getElementById('prog-num').textContent=`${jogadosJ} / ${totalJ} jogos`;
  document.getElementById('prog-fill').style.width=pct+'%';

  const n1=countsFase['fase1']||0;
  const n2=countsFase['dezesseis']||0;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="val">${scores[0].total}</div><div class="lbl">Líder: ${scores[0].p}</div></div>
    <div class="metric"><div class="val">${n1}/72</div><div class="lbl">Grupos</div></div>
    <div class="metric"><div class="val">${n2}/16</div><div class="lbl">1/16 avos</div></div>
    <div class="metric"><div class="val">${scores[0].total-scores[scores.length-1].total}</div><div class="lbl">Diferença 1º/último</div></div>`;
}

function renderResultados(){
  renderPhPills();
  const fase=FASES.find(f=>f.id===faseSelecionada);
  const jogos=getJogosFase(faseSelecionada);
  const isMata=faseSelecionada!=='fase1';
  let html='<div class="game-block">';
  let curG='';
  const gLabels={A:'Grupo A',B:'Grupo B',C:'Grupo C',D:'Grupo D',E:'Grupo E',F:'Grupo F',G:'Grupo G',H:'Grupo H',I:'Grupo I',J:'Grupo J',K:'Grupo K',L:'Grupo L'};

  jogos.forEach((j,idx)=>{
    if(faseSelecionada==='fase1'&&j.g!==curG){
      if(curG)html+=`</div><div class="game-block">`;
      curG=j.g;
      html+=`<div class="group-hdr">${gLabels[j.g]}</div>`;
    }
    const res=STATE.resultados[faseSelecionada]?.[idx]||[null,null];

    const v2=res[1]!==null?res[1]:'';
    const dataStr=j.data?`<div class="game-auto">${j.data}</div>`:'';
    // mostra origem dos times no mata-mata
    const src=faseSelecionada!=='fase1'&&faseSelecionada!=='dezesseis'?
      `<div class="game-auto" style="color:var(--text3)">${j.t1} × ${j.t2}</div>`:'';
    html+=`<div class="game-row">
      <div><div class="game-name">${j.t1} <span style="color:var(--text3)">×</span> ${j.t2}</div>${dataStr}</div>
      <div class="score-inputs">
        <input type="number" min="0" max="30" id="r_${faseSelecionada}_${idx}_1" value="${v1}" placeholder="—">
        <span class="sep">×</span>
        <input type="number" min="0" max="30" id="r_${faseSelecionada}_${idx}_2" value="${v2}" placeholder="—">
      </div>
    </div>`;
  });
  html+=`</div>`;
  if(isMata)html+=`<div class="penalty-note">⚠️ Inserir placar de tempo normal + prorrogação. Pênaltis não contam para placar exato.</div>`;
  html+=`<button class="save-btn" onclick="salvarResultados()">💾 Salvar e recalcular</button>`;
  document.getElementById('resultados-content').innerHTML=html;
}

function salvarResultados(){
  const jogos=getJogosFase(faseSelecionada);
  const ov=loadLocalOverrides();
  if(!ov[faseSelecionada])ov[faseSelecionada]={};
  jogos.forEach((_,idx)=>{
    const v1=document.getElementById(`r_${faseSelecionada}_${idx}_1`)?.value.trim();
    const v2=document.getElementById(`r_${faseSelecionada}_${idx}_2`)?.value.trim();
    if(v1!==''&&v2!==''&&!isNaN(+v1)&&!isNaN(+v2)){
      STATE.resultados[faseSelecionada][idx]=[+v1,+v2];
      ov[faseSelecionada][idx]=[+v1,+v2];
    }
  });
  saveLocalOverrides(ov);
  atualizarClassificados();
  renderRanking();
  // re-renderiza para atualizar nomes automáticos
  renderResultados();
  toast('Salvo! Ranking atualizado.','success');
}

      if(id==='fase1'&&j.g!==curG){
        curG=j.g;
        html+=`<tr><td colspan="5" style="padding:6px 11px;background:var(--surface2);font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;border-top:1px solid var(--border)">Grupo ${j.g}</td></tr>`;
      }
      const palp=getPalpites(p,id,idx);
      const res=STATE.resultados[id]?.[idx];
      const{badge,pts}=calcBadge(palp,res,peso);
      const pStr=palp&&palp[0]!==null&&palp[1]!==null?`${palp[0]} × ${palp[1]}`:'<span style="color:var(--text3)">?</span>';
      const rStr=res&&res[0]!==null?`${res[0]} × ${res[1]}`:'—';
      html+=`<tr><td>${j.t1} × ${j.t2}</td><td style="font-weight:600">${pStr}</td><td style="color:var(--text2)">${rStr}</td><td>${badge}</td><td style="color:var(--gold);font-weight:600">${pts}</td></tr>`;
    });
    html+=`</tbody></table>`;
  });
  document.getElementById('palpites-content').innerHTML=html;
}

function calcBadge(palp,res,peso){
  if(!palp||palp[0]===null||palp[1]===null)return{badge:'<span class="badge pending">—</span>',pts:''};
  if(!res||res[0]===null)return{badge:'<span class="badge pending">Pendente</span>',pts:''};
  if(res[0]===palp[0]&&res[1]===palp[1])return{badge:'<span class="badge exact">Placar exato</span>',pts:`+${3*peso}`};
  if(resJogo(res[0],res[1])===resJogo(palp[0],palp[1]))return{badge:'<span class="badge result">Resultado</span>',pts:`+${1*peso}`};
  return{badge:'<span class="badge miss">Errou</span>',pts:'0'};
}

function showTab(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');el.classList.add('active');
  if(id==='resultados'){renderPhPills();renderResultados();}
  if(id==='palpites')renderPalpites();
}

function toast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show'+(type?' '+type:'');
  setTimeout(()=>t.classList.remove('show'),3000);
}

atualizarClassificados();
renderRanking();
syncResultados(false);
</script>
